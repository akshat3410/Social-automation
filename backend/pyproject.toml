[tool.ruff]
target-version = "py313"
line-length = 100
exclude = ["database/migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = [
    "B008",  # function call in default argument — FastAPI Depends() pattern
    "E501",  # long lines in prompts/strings; formatter handles code lines
    "UP042", # keep str+Enum classes: SQLAlchemy Enum columns rely on them
    "UP046", # Generic[T] base class style kept for Python < 3.12 familiarity
]

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
check_untyped_defs = true
no_implicit_optional = true
warn_unused_ignores = false
exclude = ["database/migrations/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["."]
omit = ["tests/*", "database/migrations/*"]
