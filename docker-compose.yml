version: '3.8'

services:
  postgres:
    image: ankane/pgvector:v0.5.1
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-social_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-social_password}
      POSTGRES_DB: ${POSTGRES_DB:-social_engine}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-social_user} -d ${POSTGRES_DB:-social_engine}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social-engine-network

  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social-engine-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - social-engine-network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m dramatiq tasks.content_tasks
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - social-engine-network

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python workers/scheduler.py
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - social-engine-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - social-engine-network

networks:
  social-engine-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
